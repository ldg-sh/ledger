name = 'ledger-edge-worker'
main = "build/index.js"
compatibility_date = "2026-03-01"

[[kv_namespaces]]
binding = "METADATA_CACHE"
id = "acf6f93fc500499eab68e751b377f54a"

[[kv_namespaces]]
binding = "USER_CACHE"
id = "423b2f30666c496a846a4782f0e00c5b"

[build]
command = "cargo install -q worker-build && worker-build --release"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1